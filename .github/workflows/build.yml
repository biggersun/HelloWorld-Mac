name: Build and Release macOS App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Create Xcode project using xcodegen
      run: |
        # Install xcodegen
        brew install xcodegen

        # Create project.yml for xcodegen
        cat > project.yml << 'EOF'
        name: HelloWorld
        options:
          bundleIdPrefix: com.example
          deploymentTarget:
            macOS: "12.0"
        targets:
          HelloWorld:
            type: application
            platform: macOS
            sources:
              - HelloWorld
            settings:
              PRODUCT_BUNDLE_IDENTIFIER: com.example.HelloWorld
              INFOPLIST_FILE: HelloWorld/Info.plist
              MARKETING_VERSION: "1.0"
              CURRENT_PROJECT_VERSION: "1"
              CODE_SIGN_IDENTITY: "-"
              CODE_SIGNING_REQUIRED: NO
              CODE_SIGNING_ALLOWED: NO
              ENABLE_HARDENED_RUNTIME: YES
              COMBINE_HIDPI_IMAGES: YES
              SWIFT_VERSION: "5.0"
              MACOSX_DEPLOYMENT_TARGET: "12.0"
        EOF

        # Generate Xcode project
        xcodegen generate

    - name: Build app
      run: |
        xcodebuild -project HelloWorld.xcodeproj \
          -scheme HelloWorld \
          -configuration Release \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          | xcpretty || true

        # Check if build succeeded
        if [ ! -d "build/Build/Products/Release/HelloWorld.app" ]; then
          echo "Build failed - app not found"
          exit 1
        fi

    - name: Create DMG
      run: |
        # Create a folder for the app
        mkdir -p dmg
        cp -r build/Build/Products/Release/HelloWorld.app dmg/

        # Create DMG
        hdiutil create -volname "HelloWorld" -srcfolder dmg -ov -format UDZO HelloWorld.dmg

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: HelloWorld-macOS
        path: HelloWorld.dmg

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: HelloWorld.dmg
        body: |
          ## HelloWorld macOS App

          Download the DMG file below and double-click to install.

          ### Installation
          1. Download `HelloWorld.dmg`
          2. Open the DMG file
          3. Drag `HelloWorld.app` to your Applications folder
          4. Launch from Applications

          ### System Requirements
          - macOS 12.0 (Monterey) or later
          - Apple Silicon or Intel Mac

          ### Note
          On first launch, you may need to right-click the app and select "Open" to bypass macOS Gatekeeper, as this app is not code-signed.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
